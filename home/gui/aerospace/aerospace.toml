# AeroSpace — i3-like tiling WM. Docs: https://nikitabobko.github.io/AeroSpace/guide
config-version = 2

# Start at login (managed here, so it comes up on every boot).
start-at-login = true

# Start sketchybar with aerospace, and tell it which workspace is focused.
after-startup-command = ['exec-and-forget sketchybar']
exec-on-workspace-change = [
  '/bin/bash',
  '-c',
  'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE',
]
on-mode-changed = []

# Layout / normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true
accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Mouse follows focus across monitors.
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
automatically-unhide-macos-hidden-apps = false

# Nine numeric workspaces (dropped the A–Z ones from the default template — they
# ate every alt-<letter> key system-wide, clashing with terminal apps like zellij).
persistent-workspaces = ["1", "2", "3", "4", "5", "6", "7", "8", "9"]

[key-mapping]
preset = 'qwerty'

# Gaps between windows and screen edges (a bit of breathing room).
[gaps]
inner.horizontal = 8
inner.vertical = 8
outer.left = 8
outer.right = 8
outer.top = 8
outer.bottom = 8

# Float utility/dialog apps that don't tile nicely. Add app-ids with
# `aerospace list-apps` (or `osascript -e 'id of app "Name"'`).
[[on-window-detected]]
if.app-id = 'com.apple.systempreferences' # System Settings
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.calculator'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.ActivityMonitor'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.archiveutility'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.SystemProfiler' # System Information
run = 'layout floating'

# Example — pin an app to a workspace (uncomment + adjust):
# [[on-window-detected]]
# if.app-id = 'com.brave.Browser'
# run = 'move-node-to-workspace 2'

[mode.main.binding]
# Layout
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'

# Focus (vim hjkl)
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Move window
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Resize
alt-minus = 'resize smart -50'
alt-equal = 'resize smart +50'

# Switch workspace
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

# Move focused window to workspace
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'

# ⌥Tab / ⌥⇧Tab stay free for AltTab (the window switcher, see apps.nix),
# so back-and-forth + move-to-monitor live on ⌥` / ⌥⇧` instead.
alt-backtick = 'workspace-back-and-forth' # toggle last workspace
alt-shift-backtick = 'move-workspace-to-monitor --wrap-around next'

alt-shift-semicolon = 'mode service'

# 'service' mode: config reload, layout reset, join windows.
[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main'] # reset layout
f = ['layout floating tiling', 'mode main'] # toggle floating/tiling
backspace = ['close-all-windows-but-current', 'mode main']

alt-shift-h = ['join-with left', 'mode main']
alt-shift-j = ['join-with down', 'mode main']
alt-shift-k = ['join-with up', 'mode main']
alt-shift-l = ['join-with right', 'mode main']
